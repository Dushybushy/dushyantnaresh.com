<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project — Dushyant Naresh</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Syne:wght@400;500;600&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

/* ═══════════════════════════════════════════════════════════
   TOKENS — shared with homepage
═══════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream:      #F4EFE4;
  --cream-mid:  #EDE6D6;
  --cream-dark: #DDD4BF;
  --ink:        #1A1814;
  --ink-mid:    #3D3930;
  --ink-soft:   #6B6559;
  --ink-faint:  #9A9188;
  --stone:      #B8AC98;
  --rule:       rgba(26,24,20,0.12);
  --earth:      #85211C;
  --footer-bg:  #3D2E1E;
  --card-overhang: clamp(80px, 12vw, 50px);
  --font-d: 'Cormorant Garamond', Georgia, serif;
  --font-b: 'Syne', sans-serif;
  --font-m: 'Roboto Mono', monospace;
}

html { scroll-behavior: smooth; }
/* GRADIENT — EDIT HERE
   Change --grad-end to push the warm-to-light transition further down.
   background-color holds the endpoint colour below the gradient. */
:root { --grad-end: 1500px; }
body {
  background: linear-gradient(to bottom, #bb9663 0px, #DAC6AA var(--grad-end));
  background-repeat: no-repeat;
  background-color: #DAC6AA;
  min-height: 100vh;
  color: var(--ink); font-family: var(--font-b); font-size: 17px; line-height: 1.7;
}
a { color: inherit; text-decoration: none; }
img { display: block; }

/* ── NAV ───────────────────────────────────── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  background: var(--cream); border-bottom: 0px solid var(--rule);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 52px; height: 64px;
}
.nav-logo { font-family: var(--font-d); font-size: 18px; font-weight: 400; }
.nav-logo em { font-style: italic; color: var(--earth); }
.nav-links { display: flex; gap: 36px; list-style: none; }
.nav-links a { font-family: var(--font-b); font-size: 10px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-soft); transition: color 0.2s; }
.nav-links a:hover, .nav-links a.active { color: var(--earth); }
.nav-cta { font-family: var(--font-b); font-size: 10px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink); border: 1px solid var(--rule); padding: 10px 22px; transition: background 0.2s, color 0.2s; }
.nav-cta:hover { background: var(--ink); color: var(--cream); }

/* ── PAGE SHELL ─────────────────────────────── */
.page { padding-top: 64px; position: relative; }

/* ── FOLDER TAB / BACK LINK ─────────────────── */
.cs-folder-tab {
  position: relative; z-index: 5;
  display: flex; align-items: stretch; height: 36px;
  background: var(--cream);
  grid-column: 1 / -1;
}
.cs-folder-tab::after {
  content: ''; position: absolute;
  bottom: 0; left: 0; right: 0; height: 1px;
  background: var(--rule); opacity: 0;
}
.back-link {
  display: inline-flex; align-items: center; gap: 10px;
  font-family: var(--font-b); font-size: 9.5px; font-weight: 600;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: #85211C; background: #bb9663;
  padding: 0 36px 0 20px;
  clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 100%, 0 100%);
  min-width: 220px; transition: color 0.2s, background 0.2s;
}
.back-link:hover { color: var(--earth); background: #DAC6AA; }
.back-link svg { transition: transform 0.2s; flex-shrink: 0; }
.back-link:hover svg { transform: translateX(-3px); }

/* ── HEADER ─────────────────────────────────── */
.cs-above {
  position: relative;
  display: grid;
  grid-template-columns: calc(50% - 104px) 1fr;
  grid-template-rows: 36px auto;
  align-items: start;
}
.cs-header-band {
  position: absolute; top: 36px; left: 0; right: 0; bottom: 0;
  z-index: 1;
  background: transparent;
}
.cs-header-band::before {
  content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 0;
  /* crosshatch removed */
}
.cs-header-text {
  grid-column: 1;
  position: relative; z-index: 3;
  padding: 52px 52px 44px 52px;
  display: flex; flex-direction: column; justify-content: flex-start;
}
.cs-eyebrow {
  font-family: var(--font-b); font-size: 9.5px; font-weight: 600;
  letter-spacing: 0.24em; text-transform: uppercase; color: #85211C;
  display: flex; align-items: center; gap: 12px; margin-bottom: 24px; opacity: 0.7;
}
.cs-eyebrow::before { content: ''; display: block; width: 28px; height: 1px; background: #85211C; flex-shrink: 0; }
.cs-title {
  font-family: var(--font-d); font-size: clamp(40px, 4.2vw, 68px);
  font-weight: 300; font-style: italic; text-transform: normal; line-height: 1.05; color: #85211C;
  margin-bottom: 0; letter-spacing: -0.01em; hyphens: none;
}
/* Subtle red underline — short ink mark below the title */
.cs-title::after {
  content: '';
  display: block;
  width: 300px; height: 1px;
  background: #85211C;
  opacity: 0.65;
  margin-top: 30px;
  margin-bottom: 30px;
}
.cs-tags { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 26px; }
.cs-tag {
  font-family: var(--font-b); font-size: 9.5px; font-weight: 600;
  letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--ink); border: 1px solid var(--ink); opacity: 0.55; padding: 5px 13px;
}
.cs-subtitle {
  font-family: var(--font-d); font-size: 20px; font-style: normal;
  line-height: 1.75; color: var(--ink); opacity: 0.75; hyphens: none;
}
.cs-header-cta { margin-top: 28px; }
.cs-header-cta a {
  font-family: var(--font-b); font-size: 11px; font-weight: 600;
  letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink);
  background: transparent; border: 1px solid; color: var(--ink);
  padding: 13px 24px; display: inline-flex; align-items: center; gap: 10px;
  transition: background 0.2s, color 0.2s, border-color 0.2s;
}
.cs-header-cta a:hover { background: #85211C; color: #d2ba98; border-color: #85211C; }

/* ── POSTCARD ────────────────────────────────── */
.cs-postcard-wrap {
  grid-column: 2;
  position: relative; z-index: 10;
  padding: 28px 52px 0 52px;
  margin-bottom: calc(-1 * var(--card-overhang));
}
.cs-postcard {
  width: 100%; background: #ffffff;
  padding: 8px 8px 36px 8px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.14), 0 16px 52px rgba(0,0,0,0.18), 0 32px 80px rgba(0,0,0,0.10);
  display: flex; flex-direction: column; position: relative; cursor: pointer;
}
.cs-postcard.is-video { cursor: default; }
.cs-postcard-caption {
  position: absolute; bottom: 0; left: 0; right: 0; height: 36px;
  display: flex; align-items: center; padding: 0 10px;
  font-family: var(--font-m); font-size: 11px; letter-spacing: 0.06em;
  color: #6B5848; pointer-events: none;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.cs-postcard-media { position: relative; background: var(--ink); width: 100%; }
img.cs-media-img { width: 100%; height: auto; display: block; }
.cs-postcard-media video { width: 100%; display: block; }
.cs-postcard-media iframe { width: 100%; aspect-ratio: 16/9; display: block; border: none; }
.cs-postcard-placeholder {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 14px;
  background: rgba(26,24,20,0.5); color: rgba(212,196,174,0.4);
}
.cs-postcard-placeholder span { font-family: var(--font-b); font-size: 10px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; }

/* ── BODY ─────────────────────────────────────── */
/* ── BODY ──────────────────────────────────────── */
.cs-body {
  background: transparent;
}

/* Row 1 — tools (left col) + meta under hero (right col) */
.cs-tools-row {
  display: grid;
  grid-template-columns: calc(50% - 104px) 1fr;
}
.cs-tools-col {
  grid-column: 1;
  padding: 52px 64px 28px 52px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px 40px;
  align-content: start;
}
.cs-meta-col {
  grid-column: 2;
  padding-top: 20px;
  padding-right: 52px;
  padding-bottom: 28px;
  padding-left: 64px;
}

/* Row 2 — full-width body text */
.cs-body-text-row {
  padding: 28px 52px 80px 52px;
}

.cs-meta-row-inline { display: none !important; }
.cs-meta-row {
  display: flex; flex-wrap: wrap; gap: 10;
}
.cs-meta-item { display: flex; flex-direction: column; gap: 0px; padding-right: 40px; flex-shrink: 0; }
.cs-meta-label { font-family: var(--font-m); font-size: 8px; letter-spacing: 0.18em; text-transform: uppercase; color: #85211C; }
.cs-meta-value { font-family: var(--font-b); font-size: 15px; color: var(--ink); opacity: 0.8; white-space: nowrap; }

.cs-section-label {
  font-family: var(--font-m); font-size: 12px; letter-spacing: 0.2em;
  text-transform: uppercase; color: #85211C; margin-bottom: 32px;
  display: flex; align-items: center; gap: 14px;
}
.cs-section-label::after { content: ''; flex: 1; height: 1px; background: var(--rule); }
.cs-body-text { font-family: var(--font-b); font-size: 17px; line-height: 1.85; color: #4A3E32; }
.cs-body-text p + p { margin-top: 24px; }
.cs-body-text a { color: var(--earth); text-decoration: underline; text-underline-offset: 3px; text-decoration-thickness: 1px; }
.cs-body-text a:hover { color: #6e1a16; }
.cs-body-text iframe { width: 100%; aspect-ratio: 16/9; border: none; display: block; margin: 28px 0; }
.cs-body-text figure { margin: 28px 0; }
.cs-body-text figure img { width: 100%; display: block; }
.cs-body-text figure figcaption { font-family: var(--font-m); font-size: 11px; color: var(--ink-faint); margin-top: 8px; letter-spacing: 0.06em; }
.cs-tools-group { display: flex; flex-direction: column; }
.cs-tools-label { font-family: var(--font-m); font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: #85211C; padding-bottom: 14px; border-bottom: 1px solid var(--rule); }
.cs-tools-list { list-style: none; }
.cs-tools-list li { font-family: var(--font-b); font-size: 14px; font-weight: 400; letter-spacing: 0.08em; color: var(--ink); opacity: 0.8; padding: 12px 0; border-bottom: 1px solid rgba(26,24,20,0.14); }
.cs-tools-list li:last-child { border-bottom: none; }


/* ── GALLERY ──────────────────────────────────── */
.cs-gallery { background: transparent; padding: 0px 52px 96px; }
.cs-gallery-header { margin-bottom: 40px; }
.cs-gallery-grid {
  column-count: 3;
  column-gap: 16px;
}
.cs-img {
  display: inline-block;
  width: 100%;
  break-inside: avoid;
  margin-bottom: 16px;
  cursor: pointer;
  background: #fff;
  padding: 8px 8px 0 8px;
  box-shadow: 0 2px 8px rgba(26,24,20,0.10), 0 6px 20px rgba(26,24,20,0.10);
  position: relative;
  transition: transform 0.25s ease, box-shadow 0.25s ease;
}
.cs-img:hover {
  transform: translateY(-3px);
  box-shadow: 0 6px 20px rgba(26,24,20,0.15), 0 12px 36px rgba(26,24,20,0.12);
}
.cs-img img { width: 100%; height: auto; display: block; }
.cs-img-caption {
  padding: 8px 10px 12px;
  font-family: var(--font-m); font-size: 11px; letter-spacing: 0.06em;
  color: #6B5848; pointer-events: none;
  white-space: normal; line-height: 1.4;
}
.cs-img-placeholder {
  display: none;
  aspect-ratio: 4/3;
  background: #DDD4BF;
  flex-direction: column;
  align-items: center; justify-content: center; gap: 10px; color: var(--ink-faint);
}
.cs-img-placeholder span { font-family: var(--font-b); font-size: 9px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; opacity: 0.6; }
.cs-img-full, .cs-img-wide, .cs-img-med, .cs-img-half, .cs-img-third { }
.cs-img-360 { cursor: default; }
.cs-img-360 .pnlm-container { width: 100%; aspect-ratio: 2/1; }
.cs-img-360-badge {
  position: absolute; top: 10px; right: 10px; z-index: 10;
  background: rgba(26,20,14,0.72); color: rgba(244,239,228,0.88);
  font-family: var(--font-m); font-size: 9px; letter-spacing: 0.14em;
  text-transform: uppercase; padding: 5px 10px; pointer-events: none;
  border: 1px solid rgba(244,239,228,0.2);
}

/* ── FOOTER ───────────────────────────────────── */
.site-footer {
  background: rgba(26,24,20,0.1); padding: 0 52px; height: 64px;
  display: flex; align-items: center; justify-content: space-between;
  border-top: 1px solid rgba(26,24,20,0.12);
  position: relative; z-index: 9999;
}
.footer-logo { font-family: var(--font-d); font-size: 18px; font-weight: 400; color: var(--ink); }
.footer-logo em { font-style: italic; color: var(--earth); }
.footer-nav { display: flex; gap: 36px; list-style: none; }
.footer-nav a { font-family: var(--font-b); font-size: 10px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-soft); transition: color 0.2s; }
.footer-nav a:hover { color: var(--earth); }
.footer-right { font-family: var(--font-b); font-size: 11px; color: var(--ink-soft); }
.footer-right a { color: var(--ink-soft); transition: color 0.2s; }
.footer-right a:hover { color: var(--earth); }

/* ── LIGHTBOX — photography-style polaroid ───── */
#csLightbox {
  display: none; position: fixed; inset: 0;
  background: rgba(14,11,9,0.98);
  z-index: 9999; flex-direction: column;
  align-items: center; justify-content: center;
}
#csLightbox.open { display: flex; }
.lbx-frame {
  position: relative; display: flex;
  align-items: center; justify-content: center;
  width: 100%; padding: 0 70px; max-height: 90vh;
}
.lbx-postcard {
  background: #fff; padding: 10px 10px 48px 10px;
  box-shadow: 0 8px 48px rgba(0,0,0,0.6), 0 32px 80px rgba(0,0,0,0.4);
  flex-shrink: 0; position: relative;
  max-height: 90vh; display: flex; flex-direction: column;
}
#lbxImg {
  display: block; object-fit: contain;
  max-height: calc(90vh - 68px);
  max-width: min(90vw, 1400px);
  width: auto; height: auto;
}
.lbx-meta-strip {
  position: absolute; bottom: 0; left: 0; right: 0; height: 48px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 10px; pointer-events: none;
}
.lbx-meta-title {
  font-family: var(--font-m); font-size: 13px; letter-spacing: 0.06em;
  color: #6B5848; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  flex: 1; margin-right: 16px;
}
.lbx-arrow {
  position: absolute; top: 50%; transform: translateY(-50%);
  width: 52px; height: 52px; background: none;
  border: 1px solid rgba(244,239,228,0.2); color: rgba(244,239,228,0.5);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: border-color 0.2s, color 0.2s, background 0.2s; z-index: 2;
}
.lbx-arrow:hover { border-color: rgba(244,239,228,0.7); color: var(--cream); background: rgba(244,239,228,0.08); }
.lbx-arrow.left { left: 20px; }
.lbx-arrow.right { right: 20px; }
.lbx-arrow svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
.lbx-close { position: fixed; top: 24px; right: 28px; background: none; border: 1px solid rgba(244,239,228,0.2); color: rgba(244,239,228,0.5); font-size: 16px; width: 44px; height: 44px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: border-color 0.2s, color 0.2s; z-index: 10000; }
.lbx-close:hover { border-color: rgba(244,239,228,0.7); color: var(--cream); }
.lbx-counter { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); font-family: var(--font-m); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(244,239,228,0.25); }

/* ── ERROR / LOADING ──────────────────────────── */
.page-loading, .page-error { padding: 120px 52px; text-align: center; }
.page-loading p, .page-error p { font-family: var(--font-m); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-faint); }
.page-error h2 { font-family: var(--font-d); font-size: 32px; font-weight: 300; color: var(--ink); margin-bottom: 12px; }


/* ── HAMBURGER & MOBILE NAV ─────────────────────────────────── */
.nav-hamburger {
  display: none; flex-direction: column; gap: 5px;
  cursor: pointer; padding: 8px; background: none; border: none; margin-left: auto;
}
.nav-hamburger span { display: block; width: 22px; height: 2px; background: var(--ink); border-radius: 1px; transition: all 0.2s; }
.nav-mobile {
  display: none; position: fixed; top: 56px; left: 0; right: 0;
  background: var(--cream); border-bottom: 1px solid var(--rule);
  padding: 20px 24px 24px; z-index: 199; flex-direction: column;
}
.nav-mobile.open { display: flex; }
.nav-mobile a { font-family: var(--font-b); font-size: 11px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-soft); padding: 14px 0; border-bottom: 1px solid var(--rule); transition: color 0.2s; }
.nav-mobile a:last-child { border-bottom: none; }
.nav-mobile a:hover { color: var(--earth); }

/* ── TABLET LANDSCAPE (≤1100px) ─────────────────────────────── */
@media (max-width: 1100px) {
  nav { padding: 0 32px; }
  .cs-above { grid-template-columns: 1fr 1fr; }
  .cs-header-text { padding: 44px 32px 36px; }
  .cs-postcard-wrap { padding: 28px 32px 0 32px; }
  .cs-tools-row { grid-template-columns: 1fr 1fr; }
  .cs-tools-col { padding: 44px 40px 28px 32px; }
  .cs-meta-col { padding: 28px 32px 28px 40px; }
  .cs-body-text-row { padding: 28px 32px 0; }

  .cs-gallery { padding: 56px 32px 80px; }
  .cs-gallery { padding: 56px 32px 80px; }
  .site-footer { padding: 0 32px; }
}

/* ── TABLET PORTRAIT (≤768px) ───────────────────────────────── */
@media (max-width: 768px) {

  /* Nav */
  nav { padding: 0 24px; height: 56px; overflow: visible; }
  .nav-links { display: none; }
  .nav-cta { display: none; }
  .nav-hamburger { display: flex; }
  .page { padding-top: 56px; }

  /* ── HEADER ── */
  .cs-above { display: block; padding-bottom: 36px; background: transparent; }

  /* Band stays absolute — fills cs-above. Add enough bottom so it
     covers the postcard area too */
  .cs-header-band {
    position: absolute;
    top: 36px; left: 0; right: 0; bottom: 0;
  }

  .cs-header-text {
    position: relative; z-index: 3;
    max-width: 100%; padding: 32px 24px 24px;
  }
  .cs-title { font-size: clamp(32px, 8vw, 52px); margin-bottom: 16px; }
  .cs-subtitle { font-size: 18px; }
  .cs-eyebrow { margin-bottom: 14px; }

  /* Postcard — pull out of absolute, place below text within the band */
  .cs-postcard-wrap {
    position: relative;
    right: auto; top: auto; bottom: auto;
    width: calc(100% - 48px);
    margin: 0 24px;
    height: auto;
  }
  .cs-postcard {
    width: 100%; height: auto;
    padding: 8px 8px 36px 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.18);
  }

  /* ── BODY — tablet: stack tools + meta together, hide meta col ── */
  .cs-tools-row { display: block; }
  .cs-tools-col {
    grid-template-columns: 1fr 1fr;
    padding: 32px 24px 28px;
    gap: 32px 20px;
  }
  /* Hide the right meta column — meta is shown inside tools col instead */
  .cs-meta-col { display: none; }
  /* Show the meta row inline after tools, inside the tools col flow */
  .cs-tools-col .cs-meta-row-inline {
    display: flex !important; flex-wrap: wrap; gap: 0;
    grid-column: 1 / -1;
    padding-top: 28px;
    border-top: 1px solid var(--rule);
  }
  .cs-meta-value { white-space: normal; }
  .cs-meta-item { padding-right: 28px; padding-bottom: 12px; }
  .cs-body-text-row { padding: 32px 24px 0; }
  .cs-meta-item { padding-right: 24px; padding-bottom: 12px; }

  /* ── GALLERY ── */
  .cs-gallery { padding: 40px 24px 60px; }
  .cs-gallery-grid { column-count: 1; column-gap: 12px; }
  .cs-img { margin-bottom: 12px; }

  /* ── FOOTER ── */
  .site-footer { height: auto; padding: 24px; flex-direction: column; align-items: flex-start; gap: 16px; }
  .footer-right { text-align: left; }
}

/* ── MOBILE (≤480px) ────────────────────────────────────────── */
@media (max-width: 480px) {
  nav { padding: 0 20px; height: 52px; }
  .page { padding-top: 52px; }
  .cs-header-text { padding: 24px 20px 20px; }
  .cs-title { font-size: clamp(28px, 9vw, 44px); }
  .cs-subtitle { font-size: 17px; }
  .cs-postcard-wrap { width: calc(100% - 40px); margin: 0 20px; }
  .cs-tools-col { padding: 28px 20px 24px; }
  .cs-tools-list li { font-size: 11px; padding: 10px 0; }
  /* Meta row on mobile — match tools font size, tight padding, left-aligned */
  .cs-meta-col { display: none; }
  .cs-tools-col .cs-meta-row-inline { padding-top: 24px; }
  .cs-meta-label { font-size: 8px; }
  .cs-meta-value { font-size: 14px; white-space: normal; }
  .cs-gallery { padding: 32px 20px 48px; }
  .cs-gallery-grid { column-count: 1; }
  .site-footer { padding: 20px; }
  .footer-nav { gap: 18px; flex-wrap: wrap; }
}
</style>

<div id="csLightbox">
  <button class="lbx-close" onclick="closeLightbox()">&#x2715;</button>
  <div class="lbx-frame" onclick="closeLightbox()">
    <button class="lbx-arrow left" onclick="event.stopPropagation();lbxNav(-1)">

        <span id="lbxTitle" class="lbx-meta-title"></span>
      </div>

<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
// ── Lightbox ─────────────────────────────────────────────────
var galleryItems = [];
var galleryIndex = 0;

function openLightbox(el) {
  galleryIndex = galleryItems.indexOf(el);
  showLightboxItem(galleryIndex);
  document.getElementById('csLightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function showLightboxItem(idx) {
  var el = galleryItems[idx];
  if (!el) return;
  var lbImg = document.getElementById('lbxImg');
  var srcEl = el.querySelector('img');
  if (srcEl && srcEl.src && !srcEl.src.endsWith('/')) {
    lbImg.src = srcEl.src; lbImg.style.display = 'block';
  } else { lbImg.style.display = 'none'; }
  document.getElementById('lbxTitle').textContent = el.dataset.title || '';
  var counter = document.getElementById('lbxCounter');
  if (counter && galleryItems.length > 1) counter.textContent = (idx+1) + ' / ' + galleryItems.length;
}
function lbxNav(dir) {
  galleryIndex = (galleryIndex + dir + galleryItems.length) % galleryItems.length;
  showLightboxItem(galleryIndex);
}
function closeLightbox() {
  document.getElementById('csLightbox').classList.remove('open');
  document.body.style.overflow = '';
}
function openHeroMedia(el) {
  if (el.classList.contains('is-video')) return;
  var img = el.querySelector('.cs-media-img');
  if (!img || !img.src || img.src.endsWith('/')) return;
  document.getElementById('lbxImg').src = img.src;
  document.getElementById('lbxImg').style.display = 'block';
  document.getElementById('lbxTitle').textContent = el.dataset.title || '';
  var counter = document.getElementById('lbxCounter');
  if (counter) counter.textContent = '';
  document.getElementById('csLightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
document.addEventListener('keydown', function(e) {
  var lb = document.getElementById('csLightbox');
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape')     closeLightbox();
  if (e.key === 'ArrowRight') lbxNav(1);
  if (e.key === 'ArrowLeft')  lbxNav(-1);
});

// ── Project renderer ─────────────────────────────────────────
function esc(str) {
  return String(str || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderBodyText(text) {
  if (!text) return '';
  // Check if text contains HTML tags — if so render as innerHTML directly
  if (/<[a-z][\s\S]*>/i.test(text)) {
    // Convert any youtube.com/watch?v= or youtu.be/ links to nocookie embed iframes
    text = text.replace(/https?:\/\/(?:www\.)?youtube\.com\/watch\?(?:[^"'\s]*&)?v=([A-Za-z0-9_-]{11})[^"'\s]*/g,
      'https://www.youtube-nocookie.com/embed/$1');
    text = text.replace(/https?:\/\/youtu\.be\/([A-Za-z0-9_-]{11})[^"'\s]*/g,
      'https://www.youtube-nocookie.com/embed/$1');
    // Also replace any remaining youtube.com/embed with nocookie variant
    text = text.replace(/youtube\.com\/embed/g, 'youtube-nocookie.com/embed');
    // Split on double newlines but preserve HTML blocks
    return text.split(/\n\n+/).filter(Boolean).map(p => {
      // If paragraph starts with a block tag, don't wrap in <p>
      if (/^\s*<(iframe|div|figure|blockquote|ul|ol|h[1-6])/i.test(p)) return p;
      return `<p>${p.replace(/\n/g,'<br>')}</p>`;
    }).join('');
  }
  return text.split('\n\n').filter(Boolean)
    .map(p => `<p>${esc(p).replace(/\n/g,'<br>')}</p>`).join('');
}

function renderToolsList(items, label) {
  if (!items || !items.length) return '';
  const lis = items.map(t => `<li>${esc(t)}</li>`).join('');
  return `<div class="cs-tools-group">
    <div class="cs-tools-label">${esc(label)}</div>
    <ul class="cs-tools-list">${lis}</ul>
  </div>`;
}

function renderGallery(media) {
  if (!media || !media.length) return '';
  var sorted = media.slice().sort(function(a, b) { return (a.order || 0) - (b.order || 0); });
  var cells = sorted.map(function(m, i) {
    var lc = m.layout || 'cs-img-half';
    var url = (m.url || '')
      .replace(/https?:\/\/(?:www\.)?youtube\.com\/watch\?(?:[^"'\s]*&)?v=([A-Za-z0-9_-]{11})[^"'\s]*/g, 'https://www.youtube-nocookie.com/embed/$1')
      .replace(/https?:\/\/youtu\.be\/([A-Za-z0-9_-]{11})[^"'\s]*/g, 'https://www.youtube-nocookie.com/embed/$1')
      .replace('youtube.com/embed', 'youtube-nocookie.com/embed');
    if (m.type === 'video') {
      return '<div class="'+lc+' cs-img"><iframe src="'+esc(url)+'" allowfullscreen style="width:100%;height:100%;border:none;display:block;"></iframe></div>';
    }
    if (m.type === '360') {
      var pid = 'pnlm-' + i;
      return '<div class="'+lc+' cs-img cs-img-360" data-pnlm-src="'+esc(url)+'" id="'+pid+'">'
        +'<div class="cs-img-360-badge">360°</div>'
        +'</div>';
    }
    var captionHtml = '<div class="cs-img-caption">'+(m.caption ? esc(m.caption) : '')+'</div>';
    return '<div class="'+lc+' cs-img" data-title="'+esc(m.caption||'')+'" data-meta="" onclick="openLightbox(this)">'
      +'<img src="'+esc(url)+'" alt="'+esc(m.caption||'')+'" loading="lazy" onload="var p=this.parentNode.querySelector(\'.cs-img-placeholder\');if(p)p.style.display=\'none\';" onerror="this.style.display=\'none\';var p=this.parentNode.querySelector(\'.cs-img-placeholder\');if(p){p.style.display=\'flex\';}">'
      +'<div class="cs-img-placeholder"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><rect x="2" y="5" width="24" height="18" rx="2" stroke="currentColor" stroke-width="1"/><circle cx="14" cy="14" r="5" stroke="currentColor" stroke-width="1"/></svg><span>Image</span></div>'
      +captionHtml
      +'</div>';
  }).join('');
  return '<div class="cs-gallery">'
    +'<div class="cs-gallery-header"><div class="cs-section-label" style="width:100%;margin-bottom:0">Project media</div></div>'
    +'<div class="cs-gallery-grid">'+cells+'</div>'
    +'</div>';
}

async function loadProject() {
  const root = document.getElementById('pageRoot');
  const id = new URLSearchParams(window.location.search).get('id');

  if (!id) {
    root.innerHTML = '<div class="page-error"><h2>No project specified</h2><p>Return to <a href="projects.html" style="color:var(--earth)">all projects</a>.</p></div>';
    return;
  }

  let project;
  try {
    const res = await fetch('projects.json');
    if (!res.ok) throw new Error();
    const all = await res.json();
    project = all.find(p => p.id === id);
  } catch(e) {
    root.innerHTML = '<div class="page-error"><h2>Could not load project</h2><p>Make sure you are running a local server (e.g. VS Code Live Server). Opening HTML files directly as file:// will block fetch() requests.</p></div>';
    return;
  }

  if (!project) {
    root.innerHTML = `<div class="page-error"><h2>Project not found</h2><p>No project matching "${esc(id)}".</p></div>`;
    return;
  }

  document.title = `${project.title} — Dushyant Naresh`;

  // Cover media for postcard
  const hasCover    = !!project.coverImage;
  const isVideoHero = project.coverImage && (project.coverImage.includes('youtube') || project.coverImage.includes('vimeo') || project.coverImage.includes('embed'));
  const postcardClass = isVideoHero ? 'cs-postcard is-video' : 'cs-postcard';

  let mediaInner = '';
  if (hasCover && isVideoHero) {
    mediaInner = `<iframe src="${esc(project.coverImage)}" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
  } else if (hasCover) {
    mediaInner = `<img class="cs-media-img" src="${esc(project.coverImage)}" alt="${esc(project.coverAlt || project.title)}">`;
  } else {
    mediaInner = `<div class="cs-postcard-placeholder">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
        <rect x="4" y="10" width="40" height="28" rx="2" stroke="currentColor" stroke-width="1.2"/>
        <circle cx="24" cy="24" r="8" stroke="currentColor" stroke-width="1.2"/>
        <circle cx="24" cy="24" r="3" fill="currentColor" opacity="0.4"/>
      </svg>
      <span>Image coming soon</span>
    </div>`;
  }

  const ctaHTML = (project.ctaLabel && project.ctaUrl)
    ? `<div class="cs-header-cta"><a href="${esc(project.ctaUrl)}" target="_blank" rel="noopener">${esc(project.ctaLabel)} →</a></div>`
    : '';

  const tagsHTML = (project.tags || []).map(t => `<span class="cs-tag">${esc(t)}</span>`).join('');

  const toolsHTML  = renderToolsList(project.tools,   'Tools');
  const methodsHTML = renderToolsList(project.methods, 'Methods');

  const metaItems = [
    project.year        && `<div class="cs-meta-item"><div class="cs-meta-label">Year</div><div class="cs-meta-value">${esc(project.year)}</div></div>`,
    project.role        && `<div class="cs-meta-item"><div class="cs-meta-label">Role</div><div class="cs-meta-value">${esc(project.role)}</div></div>`,
    project.client      && `<div class="cs-meta-item"><div class="cs-meta-label">Client</div><div class="cs-meta-value">${esc(project.client)}</div></div>`,
    project.institution && `<div class="cs-meta-item"><div class="cs-meta-label">Institution</div><div class="cs-meta-value">${esc(project.institution)}</div></div>`,
  ].filter(Boolean).join('');

  const galleryHTML = renderGallery(project.media);

  const allText = renderBodyText(project.body);

  root.innerHTML =
    // ── Header ──
    '<div class="cs-above">'
    +'<div class="cs-folder-tab">'
    +'<a href="projects.html" class="back-link"><svg width="16" height="10" viewBox="0 0 16 10" fill="none"><path d="M15 5H1M6 1.5L1.5 5 6 8.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>Back to projects</a>'
    +'</div>'
    +'<div class="cs-header-band"></div>'
    +'<div class="cs-header-text">'
    +'<h1 class="cs-title">'+esc(project.title)+'</h1>'
    +'<div class="cs-tags">'+tagsHTML+'</div>'
    +'<p class="cs-subtitle">'+esc(project.subtitle || '')+'</p>'
    +ctaHTML
    +'</div>'
    +'<div class="cs-postcard-wrap">'
    +'<div class="cs-postcard'+(isVideoHero?' is-video':'')+'" data-title="'+esc(project.coverCaption||project.title)+'" onclick="openHeroMedia(this)">'
    +'<div class="cs-postcard-media">'+mediaInner+'</div>'
    +(project.coverCaption ? '<div class="cs-postcard-caption">'+esc(project.coverCaption)+'</div>' : '')
    +'</div>'
    +'</div>'
    +'</div>'

    // ── Body ──
    +'<div class="cs-body">'
    // Row 1: tools left, meta right (under hero)
    +'<div class="cs-tools-row">'
    +'<div class="cs-tools-col">'
    +toolsHTML
    +methodsHTML
    +(metaItems ? '<div class="cs-meta-row-inline cs-meta-row">'+metaItems+'</div>' : '')
    +'</div>'
    +(metaItems ? '<div class="cs-meta-col"><div class="cs-meta-row">'+metaItems+'</div></div>' : '<div class="cs-meta-col"></div>')
    +'</div>'
    // Row 2: full-width overview
    +'<div class="cs-body-text-row">'
    +'<div class="cs-section-label">Project overview</div>'
    +'<div class="cs-body-text">'+allText+'</div>'
    +'</div>'
    +'</div>'

    +galleryHTML

    +'<footer class="site-footer">'
    +'<a href="index.html" class="footer-logo">Dushyant <em style="font-style:italic;color:var(--earth)">Naresh</em></a>'
    +'<ul class="footer-nav"><li><a href="projects.html">Projects</a></li><li><a href="photography.html">Photography</a></li><li><a href="about.html">About</a></li></ul>'
    +'<div class="footer-right"><a href="mailto:naresh.dush@gmail.com">naresh.dush@gmail.com</a></div>'
    +'</footer>';

  // Register gallery items for lightbox
  galleryItems = Array.from(document.querySelectorAll('.cs-img[data-title]'));

  // Align meta col once postcard image loads
  var coverImg = document.querySelector('.cs-media-img');
  if (coverImg) {
    if (coverImg.complete) {
      requestAnimationFrame(alignMetaCol);
    } else {
      coverImg.addEventListener('load', function() { requestAnimationFrame(alignMetaCol); });
      coverImg.addEventListener('error', function() { requestAnimationFrame(alignMetaCol); });
    }
  } else {
    requestAnimationFrame(alignMetaCol);
  }

  // Initialise Pannellum 360 viewers
  document.querySelectorAll('.cs-img-360[data-pnlm-src]').forEach(function(el) {
    var src = el.getAttribute('data-pnlm-src');
    if (!src || typeof pannellum === 'undefined') return;
    pannellum.viewer(el.id, {
      type: 'equirectangular',
      panorama: src,
      autoLoad: true,
      showFullscreenCtrl: true,
      showZoomCtrl: false,
      mouseZoom: false,
      compass: false,
      hfov: 100,
    });
  });
}

loadProject();

// ── ALIGN META ROW under postcard ────────────────────────────
// Runs after the cover image loads so we know the postcard's actual height.
// Sets cs-meta-col padding-top so the meta sits just below the postcard bottom.
function alignMetaCol() {
  var postcard = document.querySelector('.cs-postcard');
  var metaCol  = document.querySelector('.cs-meta-col');
  if (!postcard || !metaCol) return;
  // Only on desktop (meta col is hidden on tablet/mobile)
  if (window.getComputedStyle(metaCol).display === 'none') return;
  var toolsRow  = document.querySelector('.cs-tools-row');
  var pcRect    = postcard.getBoundingClientRect();
  var rowRect   = toolsRow ? toolsRow.getBoundingClientRect() : pcRect;
  // Distance from top of cs-tools-row to bottom of postcard
  var offset = pcRect.bottom - rowRect.top + 20;
  metaCol.style.paddingTop = Math.max(20, offset) + 'px';
}

document.addEventListener('DOMContentLoaded', function() {
  // Re-run on cover image load
  document.addEventListener('load', function(e) {
    if (e.target.classList && e.target.classList.contains('cs-media-img')) {
      alignMetaCol();
    }
  }, true);
  // Also run on resize
  window.addEventListener('resize', alignMetaCol);
});

// ── MOBILE NAV ────────────────────────────────────────────────
function toggleMobileNav() {
  document.getElementById('navMobile').classList.toggle('open');
}
document.addEventListener('click', function(e) {
  var nav = document.getElementById('navMobile');
  var btn = document.getElementById('navHamburger');
  if (nav && nav.classList.contains('open') && !nav.contains(e.target) && btn && !btn.contains(e.target)) {
    nav.classList.remove('open');
  }
});

// ── PAPER GRAIN ───────────────────────────────────────────────
// Draws per-pixel random noise onto a canvas, converts to PNG data URL,
// tiles it as the background of a fixed overlay div.
// This is the only reliable cross-browser texture method.
(function() {
  var S = 256;
  var c = document.createElement('canvas');
  c.width = S; c.height = S;
  var ctx = c.getContext('2d');
  var img = ctx.createImageData(S, S);
  var d = img.data;
  for (var i = 0; i < d.length; i += 4) {
    var v = Math.floor(Math.random() * 255);
    d[i]   = v;
    d[i+1] = v;
    d[i+2] = v;
    d[i+3] = Math.floor(Math.random() * 60 + 30); // alpha 30–90
  }
  ctx.putImageData(img, 0, 0);
  var url = c.toDataURL('image/png');
  var el = document.createElement('div');
  el.style.cssText =
    'position:fixed;inset:0;pointer-events:none;z-index:9998;' +
    'mix-blend-mode:multiply;opacity:0.20;' +
    'background:url(' + url + ') repeat;' +
    'background-size:' + S + 'px ' + S + 'px';
  document.body.insertBefore(el, document.body.firstChild);
})();
</script>
