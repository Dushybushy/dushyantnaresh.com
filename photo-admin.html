<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Admin — Dushyant Naresh</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Syne:wght@400;500;600&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cream:    #F4EFE4;
  --tan:      #E2D4BC;
  --sandy:    #d2ba98;
  --ink:      #1A1814;
  --ink-soft: #6B6559;
  --ink-faint:#9A9188;
  --rule:     rgba(26,24,20,0.12);
  --earth:    #85211C;
  --green:    #2A6040;
  --font-d: 'Cormorant Garamond', Georgia, serif;
  --font-b: 'Syne', sans-serif;
  --font-m: 'Roboto Mono', monospace;
}
html, body { height: 100%; }
body { background: var(--cream); color: var(--ink); font-family: var(--font-b); font-size: 15px; line-height: 1.5; display: flex; flex-direction: column; }

/* ── TOPBAR ─────────────────── */
.topbar {
  flex-shrink: 0;
  background: var(--ink); color: var(--cream);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px; height: 52px;
}
.topbar-left { display: flex; align-items: center; gap: 20px; }
.topbar-logo { font-family: var(--font-d); font-size: 17px; }
.topbar-logo em { font-style: italic; color: var(--sandy); }
.topbar-title { font-family: var(--font-m); font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(244,239,228,0.4); }
.topbar-actions { display: flex; gap: 10px; align-items: center; }
.pending-badge { font-family: var(--font-m); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(244,239,228,0.75); display: none; }
.pending-badge.visible { display: block; }

/* ── TABS ───────────────────── */
.tabs {
  flex-shrink: 0;
  background: var(--tan); border-bottom: 1px solid var(--rule);
  display: flex; padding: 0 32px;
}
.tab { font-family: var(--font-b); font-size: 13px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; padding: 13px 20px; cursor: pointer; border: none; background: none; color: var(--ink-soft); border-bottom: 3px solid transparent; margin-bottom: -1px; transition: color 0.15s, border-color 0.15s; }
.tab:hover { color: var(--ink); }
.tab.active { color: var(--earth); border-bottom-color: var(--earth); }

/* ── BUTTONS ─────────────────── */
.btn { font-family: var(--font-b); font-size: 13px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; padding: 9px 18px; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 7px; transition: background 0.15s, color 0.15s, opacity 0.15s; flex-shrink: 0; }
.btn:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-primary { background: var(--earth); color: var(--cream); }
.btn-primary:hover:not(:disabled) { background: #6e1a16; }
.btn-ghost { background: transparent; color: rgba(244,239,228,0.65); border: 1px solid rgba(244,239,228,0.2); }
.btn-ghost:hover:not(:disabled) { background: rgba(244,239,228,0.08); color: var(--cream); }
.btn-light { background: var(--tan); color: var(--ink); border: 1px solid var(--rule); }
.btn-light:hover:not(:disabled) { background: var(--sandy); }
.btn-danger { background: transparent; color: var(--earth); border: 1px solid rgba(133,33,28,0.3); }
.btn-danger:hover:not(:disabled) { background: var(--earth); color: var(--cream); }
.btn-sm { padding: 7px 14px; font-size: 12px; }
.btn-icon { padding: 7px 9px; font-size: 15px; }

/* ── WORKSPACE ───────────────── */
.workspace { flex: 1; min-height: 0; display: flex; overflow: hidden; }
.panel { display: none; flex: 1; min-height: 0; overflow: hidden; }
.panel.active { display: flex; }

/* ══════════════════════════════════════════════════════
   PHOTOS PANEL
══════════════════════════════════════════════════════ */
#panelPhotos { flex-direction: row; }

/* Photo grid (left) */
.photo-grid-col {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column;
  border-right: 1px solid var(--rule);
}
.photo-grid-header {
  flex-shrink: 0; padding: 16px 24px;
  border-bottom: 1px solid var(--rule);
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
  background: var(--cream);
}
.photo-grid-header-left { display: flex; align-items: center; gap: 16px; }
.col-label { font-family: var(--font-m); font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-faint); }
.photo-grid-scroll { flex: 1; overflow-y: auto; padding: 20px 24px; }
.photo-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 14px;
}
.photo-thumb {
  cursor: pointer; display: flex; flex-direction: column;
  border: 2px solid transparent; transition: border-color 0.15s;
}
.photo-thumb:hover { border-color: var(--sandy); }
.photo-thumb.active { border-color: var(--earth); }
.photo-thumb-img {
  width: 100%; aspect-ratio: 4/3;
  background: var(--tan); overflow: hidden; position: relative;
  display: flex; align-items: center; justify-content: center;
}
.photo-thumb-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
.photo-thumb-img-empty { color: var(--ink-faint); font-size: 24px; opacity: 0.4; }
.photo-thumb-info { padding: 7px 8px; background: var(--tan); }
.photo-thumb-title { font-family: var(--font-b); font-size: 12px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.photo-thumb-album { font-family: var(--font-m); font-size: 11px; color: var(--ink-faint); margin-top: 2px; }

/* Photo editor (right) */
.photo-editor-col {
  width: 420px; flex-shrink: 0;
  display: flex; flex-direction: column;
  background: var(--cream);
}
.photo-editor-col-empty {
  flex: 1; display: flex; align-items: center; justify-content: center;
  color: var(--ink-faint); flex-direction: column; gap: 12px;
}
.photo-editor-col-empty p { font-family: var(--font-m); font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; }
.photo-editor-col-inner { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }

/* Preview image at top of editor */
.photo-preview {
  width: 100%; aspect-ratio: 4/3;
  background: var(--ink); overflow: hidden; position: relative; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.photo-preview img { width: 100%; height: 100%; object-fit: contain; display: block; }
.photo-preview-empty { color: rgba(212,196,174,0.2); font-size: 36px; }
.photo-preview-label {
  position: absolute; bottom: 10px; left: 12px;
  font-family: var(--font-m); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
  color: rgba(212,196,174,0.4);
}

/* Editor form */
.editor-form { padding: 20px 24px 80px; display: flex; flex-direction: column; gap: 20px; }
.editor-form-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding-bottom: 16px; border-bottom: 1px solid var(--rule); }
.editor-form-title { font-family: var(--font-d); font-size: 22px; font-weight: 300; }

/* ── FORM FIELDS ─────────────── */
.form-section-title { font-family: var(--font-m); font-size: 11px; font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }
.form-section-title::after { content: ''; flex: 1; height: 1px; background: var(--rule); }
.form-grid { display: grid; gap: 14px; }
.form-grid-2 { grid-template-columns: 1fr 1fr; }
.form-grid-3 { grid-template-columns: 1fr 1fr 1fr; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field-label { font-family: var(--font-m); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-soft); }
.field-hint { font-family: var(--font-b); font-size: 12px; color: var(--ink-faint); }
input[type="text"], input[type="url"], select {
  font-family: var(--font-b); font-size: 14px; color: var(--ink);
  background: var(--tan); border: 1px solid var(--rule);
  padding: 10px 12px; outline: none; width: 100%;
  transition: border-color 0.15s, background 0.15s;
  -webkit-appearance: none; border-radius: 0;
}
input:focus, select:focus { border-color: rgba(133,33,28,0.5); background: var(--cream); }
.tags-input { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; padding: 7px 9px; background: var(--tan); border: 1px solid var(--rule); min-height: 44px; cursor: text; transition: border-color 0.15s; }
.tags-input:focus-within { border-color: rgba(133,33,28,0.5); background: var(--cream); }
.tag-chip { display: inline-flex; align-items: center; gap: 4px; font-family: var(--font-b); font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; background: var(--sandy); color: var(--ink); padding: 3px 8px; }
.tag-chip-del { background: none; border: none; cursor: pointer; color: var(--ink-soft); font-size: 12px; padding: 0; line-height: 1; }
.tag-chip-del:hover { color: var(--earth); }
.tag-input-field { border: none; background: transparent; outline: none; font-family: var(--font-b); font-size: 14px; color: var(--ink); min-width: 80px; flex: 1; padding: 2px 3px; }

/* ══════════════════════════════════════════════════════
   ALBUMS PANEL
══════════════════════════════════════════════════════ */
#panelAlbums { flex-direction: row; }

/* Album list (col 1) */
.album-list-col {
  width: 280px; flex-shrink: 0;
  display: flex; flex-direction: column;
  border-right: 1px solid var(--rule);
  background: var(--tan);
}
.album-list-header {
  flex-shrink: 0; padding: 16px 20px;
  border-bottom: 1px solid var(--rule);
  display: flex; align-items: center; justify-content: space-between;
}
.album-list-scroll { flex: 1; overflow-y: auto; padding: 8px 0; }
.album-row {
  display: flex; align-items: center; gap: 0;
  cursor: pointer; border-left: 3px solid transparent;
  transition: background 0.15s;
  user-select: none;
}
.album-row:hover { background: var(--sandy); }
.album-row.active { background: var(--cream); border-left-color: var(--earth); }
.album-row.dragging { opacity: 0.4; }
.album-row.drag-over { border-top: 2px solid var(--earth); }
.album-row-drag { padding: 14px 8px; cursor: grab; color: var(--ink-faint); font-size: 14px; flex-shrink: 0; }
.album-row-drag:active { cursor: grabbing; }
.album-row-info { flex: 1; padding: 12px 8px; min-width: 0; }
.album-row-name { font-family: var(--font-b); font-size: 14px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.album-row-name.hidden-album { opacity: 0.45; font-style: italic; }
.album-row-meta { font-family: var(--font-m); font-size: 11px; color: var(--ink-faint); margin-top: 2px; display: flex; align-items: center; gap: 6px; }
.album-hidden-badge { font-family: var(--font-m); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--earth); opacity: 0.7; }

/* Album detail (col 2) */
.album-detail-col {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column;
  background: var(--cream);
}
.album-detail-empty {
  flex: 1; display: flex; align-items: center; justify-content: center;
  color: var(--ink-faint); flex-direction: column; gap: 12px;
}
.album-detail-empty p { font-family: var(--font-m); font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; }
.album-detail-header {
  flex-shrink: 0; padding: 16px 24px;
  border-bottom: 1px solid var(--rule);
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
}
.album-detail-name-wrap { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
.album-name-input { font-family: var(--font-d); font-size: 22px; font-weight: 300; color: var(--ink); background: transparent; border: none; border-bottom: 1px solid transparent; outline: none; width: 100%; transition: border-color 0.15s; padding-bottom: 2px; }
.album-name-input:focus { border-bottom-color: var(--earth); }
.album-detail-actions { display: flex; gap: 8px; flex-shrink: 0; }

/* Album photo list */
.album-photo-scroll { flex: 1; overflow-y: auto; }
.album-photo-list { display: flex; flex-direction: column; }
.album-photo-row {
  display: flex; align-items: center; gap: 0;
  border-bottom: 1px solid var(--rule);
  transition: background 0.15s;
  user-select: none;
}
.album-photo-row:hover { background: rgba(210,186,152,0.2); }
.album-photo-row.dragging { opacity: 0.4; }
.album-photo-row.drag-over { border-top: 2px solid var(--earth); }
.album-photo-drag { padding: 14px 12px; cursor: grab; color: var(--ink-faint); font-size: 14px; flex-shrink: 0; }
.album-photo-drag:active { cursor: grabbing; }
.album-photo-thumb { width: 64px; height: 48px; flex-shrink: 0; background: var(--tan); overflow: hidden; }
.album-photo-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.album-photo-thumb-empty { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: var(--ink-faint); font-size: 18px; }
.album-photo-info { flex: 1; padding: 10px 14px; min-width: 0; }
.album-photo-title { font-family: var(--font-b); font-size: 13px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.album-photo-meta { font-family: var(--font-m); font-size: 11px; color: var(--ink-faint); margin-top: 2px; }
.album-photo-del { padding: 14px 16px; color: var(--ink-faint); opacity: 0; transition: opacity 0.15s; background: none; border: none; cursor: pointer; font-size: 14px; flex-shrink: 0; }
.album-photo-row:hover .album-photo-del { opacity: 1; }
.album-photo-del:hover { color: var(--earth); }
.album-empty-hint { padding: 40px 24px; text-align: center; color: var(--ink-faint); font-family: var(--font-m); font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; }

/* ── SAVE BAR ────────────────── */
.save-bar {
  display: none; position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--cream); border-top: 1px solid var(--rule);
  padding: 14px 32px; align-items: center; justify-content: space-between; z-index: 50;
}
.save-bar.visible { display: flex; }
.save-bar-hint { font-family: var(--font-m); font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-faint); }

/* ── LOAD SCREEN ─────────────── */
.load-screen {
  position: fixed; inset: 0; background: var(--cream);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; z-index: 500;
}
.load-screen.hidden { display: none; }
.load-screen-title { font-family: var(--font-d); font-size: 28px; font-weight: 300; color: var(--ink); }
.load-screen-sub { font-family: var(--font-m); font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-faint); }

/* ── TOAST ───────────────────── */
.toast { position: fixed; bottom: 72px; left: 50%; transform: translateX(-50%); background: var(--ink); color: var(--cream); font-family: var(--font-m); font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; padding: 11px 22px; z-index: 999; white-space: nowrap; display: none; }
.toast.show { display: block; }
.toast.success { background: var(--green); }
</style>
</head>
<body>

<!-- Load screen -->
<div class="load-screen" id="loadScreen">
  <div class="load-screen-title">Dushyant <em style="font-style:italic;color:var(--sandy)">Naresh</em></div>
  <div class="load-screen-sub">Photo Admin</div>
  <button class="btn btn-light" onclick="loadFromFile()" style="margin-top:8px">Load photos.json</button>
  <input type="file" id="fileInput" accept=".json" style="display:none" onchange="onFileChosen(event)">
</div>

<!-- Topbar -->
<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">Dushyant <em>Naresh</em></div>
    <div class="topbar-title">Photo Admin</div>
  </div>
  <div class="topbar-actions">
    <span class="pending-badge" id="pendingBadge">Unsaved changes</span>
    <button class="btn btn-ghost btn-sm" onclick="loadFromFile()">↑ Load new file</button>
    <button class="btn btn-primary btn-sm" id="saveBtn" onclick="saveToFile()" disabled>↓ Save photos.json</button>
  </div>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab active" id="tab-photos" onclick="switchTab('photos')">Photos</button>
  <button class="tab" id="tab-albums" onclick="switchTab('albums')">Albums</button>
</div>

<!-- Workspace -->
<div class="workspace">

  <!-- ── PHOTOS PANEL ── -->
  <div class="panel active" id="panelPhotos">

    <!-- Left: photo grid -->
    <div class="photo-grid-col">
      <div class="photo-grid-header">
        <div class="photo-grid-header-left">
          <span class="col-label" id="photoCount">0 photos</span>
          <input type="text" id="photoSearch" placeholder="Search by title or tag…" oninput="filterPhotoGrid()" style="font-family:var(--font-b);font-size:13px;color:var(--ink);background:var(--tan);border:1px solid var(--rule);padding:7px 12px;outline:none;width:240px;transition:border-color 0.15s;">
        </div>
        <button class="btn btn-light btn-sm" onclick="newPhoto()">+ Add photo</button>
      </div>
      <div class="photo-grid-scroll">
        <div class="photo-grid" id="photoGrid"></div>
      </div>
    </div>

    <!-- Right: photo editor -->
    <div class="photo-editor-col" id="photoEditorCol">
      <div class="photo-editor-col-empty" id="photoEditorEmpty">
        <div style="font-size:36px;opacity:0.15">◎</div>
        <p>Click a photo to edit</p>
      </div>
      <div class="photo-editor-col-inner" id="photoEditorInner" style="display:none">
        <!-- Preview -->
        <div class="photo-preview" id="photoPreview">
          <div class="photo-preview-empty" id="photoPreviewEmpty">◎</div>
          <img id="photoPreviewImg" src="" alt="" style="display:none">
          <span class="photo-preview-label" id="photoPreviewLabel"></span>
        </div>
        <!-- Form -->
        <div class="editor-form" id="photoEditorForm">
          <div class="editor-form-header">
            <div class="editor-form-title" id="photoFormTitle">—</div>
            <button class="btn btn-danger btn-sm" onclick="deletePhoto()">Delete</button>
          </div>

          <div>
            <div class="form-section-title">Identity</div>
            <div class="form-grid">
              <div class="field">
                <label class="field-label">Title</label>
                <input type="text" id="pf-title" placeholder="Photo title">
              </div>
              <div class="field">
                <label class="field-label">Album</label>
                <select id="pf-album"></select>
              </div>
              <div class="field">
                <label class="field-label">Orientation</label>
                <select id="pf-orientation">
                  <option value="landscape">Landscape</option>
                  <option value="portrait">Portrait</option>
                  <option value="square">Square</option>
                </select>
              </div>
              <div class="field">
                <label class="field-label">Tags</label>
                <div class="field-hint">Press Enter or comma to add</div>
                <div class="tags-input" id="photo-tags-input" onclick="focusPhotoTagInput()">
                  <input class="tag-input-field" id="photo-tag-field" placeholder="e.g. landscape" onkeydown="onPhotoTagKey(event)">
                </div>
              </div>
            </div>
          </div>

          <div>
            <div class="form-section-title">Image</div>
            <div class="field">
              <label class="field-label">Image path or URL</label>
              <div class="field-hint">e.g. images/heritage/photo.jpg</div>
              <input type="url" id="pf-src" placeholder="images/album/filename.jpg" oninput="onSrcInput()">
            </div>
          </div>

          <div>
            <div class="form-section-title">Camera Metadata <span style="opacity:0.5;font-size:0.85em;letter-spacing:0;text-transform:none;font-family:var(--font-b)">— optional</span></div>
            <div class="form-grid form-grid-3">
              <div class="field">
                <label class="field-label">Focal Length</label>
                <input type="text" id="pf-focalLength" placeholder="24mm">
              </div>
              <div class="field">
                <label class="field-label">Aperture</label>
                <input type="text" id="pf-aperture" placeholder="f/8">
              </div>
              <div class="field">
                <label class="field-label">Shutter Speed</label>
                <input type="text" id="pf-shutterSpeed" placeholder="1/250s">
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>

  </div>

  <!-- ── ALBUMS PANEL ── -->
  <div class="panel" id="panelAlbums">

    <!-- Col 1: album list -->
    <div class="album-list-col">
      <div class="album-list-header">
        <span class="col-label" id="albumCount">0 albums</span>
        <button class="btn btn-light btn-sm" onclick="newAlbum()">+ New</button>
      </div>
      <div class="album-list-scroll">
        <div id="albumList"></div>
      </div>
    </div>

    <!-- Col 2: album detail -->
    <div class="album-detail-col">
      <div class="album-detail-empty" id="albumDetailEmpty">
        <div style="font-size:36px;opacity:0.15">▤</div>
        <p>Select an album</p>
      </div>
      <div id="albumDetailInner" style="display:none;flex-direction:column;flex:1;min-height:0;">
        <div class="album-detail-header">
          <div class="album-detail-name-wrap">
            <input class="album-name-input" id="albumNameInput" type="text" placeholder="Album name" oninput="onAlbumNameInput()">
          </div>
          <div class="album-detail-actions">
            <button class="btn btn-light btn-sm" id="albumVisibilityBtn" onclick="toggleAlbumVisibility()">Hide</button>
            <button class="btn btn-danger btn-sm" onclick="deleteAlbum()">Delete</button>
          </div>
        </div>
        <div class="album-photo-scroll">
          <div class="album-photo-list" id="albumPhotoList"></div>
          <div class="album-empty-hint" id="albumEmptyHint" style="display:none">No photos in this album</div>
        </div>
      </div>
    </div>

  </div>

</div>

<!-- Save bar -->
<div class="save-bar" id="saveBar">
  <div class="save-bar-hint">Unsaved changes</div>
  <div style="display:flex;gap:10px">
    <button class="btn btn-light btn-sm" onclick="revertPhoto()">Revert</button>
    <button class="btn btn-primary btn-sm" onclick="applyAndSave()">Apply &amp; save ↓</button>
  </div>
</div>


<script>
// ── State ─────────────────────────────────────────────────────
var photos = [], albums = [];
var activePhotoIndex = -1;
var activeAlbumIndex = -1;
var dirty = false;
var currentTab = 'photos';
var photoTags = [];

// ── Load / Save ───────────────────────────────────────────────
function loadFromFile() { document.getElementById('fileInput').click(); }
function onFileChosen(e) {
  var file = e.target.files[0]; if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    try {
      var data = JSON.parse(ev.target.result);
      albums = (data.albums||[]).slice().sort(function(a,b){ return (a.order||0)-(b.order||0); });
      photos = data.photos||[];
      document.getElementById('loadScreen').classList.add('hidden');
      document.getElementById('saveBtn').disabled = false;
      renderAll();
      showToast('Loaded ' + photos.length + ' photos', 'success');
    } catch(err) { alert('Invalid JSON.'); }
  };
  reader.readAsText(file); e.target.value = '';
}
function saveToFile() {
  if (dirty && activePhotoIndex >= 0) applyPhotoChanges();
  var blob = new Blob([JSON.stringify({ albums: albums, photos: photos }, null, 2)], { type: 'application/json' });
  var a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'photos.json'; a.click(); URL.revokeObjectURL(a.href);
  showToast('photos.json downloaded', 'success');
  document.getElementById('pendingBadge').classList.remove('visible');
  setDirty(false);
}
function applyAndSave() { applyPhotoChanges(); saveToFile(); }

// ── Dirty ─────────────────────────────────────────────────────
function setDirty(val) {
  dirty = val;
  var bar = document.getElementById('saveBar');
  bar.classList.toggle('visible', val && currentTab === 'photos' && activePhotoIndex >= 0);
}
function markDirty() { setDirty(true); document.getElementById('pendingBadge').classList.add('visible'); }

// ── Tabs ──────────────────────────────────────────────────────
function switchTab(tab) {
  if (dirty && activePhotoIndex >= 0) applyPhotoChanges();
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.getElementById('tab-'+tab).classList.add('active');
  document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('active'); });
  document.getElementById('panel'+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add('active');
  setDirty(false);
}

// ── Render all ────────────────────────────────────────────────
function renderAll() { renderPhotoGrid(); renderAlbumSelect(); renderAlbumList(); }

// ══════════════════════════════════════════════════════
// PHOTOS
// ══════════════════════════════════════════════════════

function renderPhotoGrid() {
  var grid = document.getElementById('photoGrid');
  grid.innerHTML = '';
  photos.forEach(function(p, i) {
    var card = document.createElement('div');
    card.className = 'photo-thumb' + (i === activePhotoIndex ? ' active' : '');
    card.dataset.index = i;
    var imgHTML = p.src
      ? '<img src="'+esc(p.src)+'" alt="'+esc(p.title||'')+'" loading="lazy">'
      : '<div class="photo-thumb-img-empty">◎</div>';
    card.innerHTML =
      '<div class="photo-thumb-img">'+imgHTML+'</div>'
      +'<div class="photo-thumb-info">'
      +'<div class="photo-thumb-title">'+esc(p.title||'Untitled')+'</div>'
      +'<div class="photo-thumb-album">'+esc(getAlbumName(p.album))+'</div>'
      +'</div>';
    card.addEventListener('click', function(){ selectPhoto(i); });
    grid.appendChild(card);
  });
  document.getElementById('photoCount').textContent = photos.length + ' photo'+(photos.length!==1?'s':'');
}

function selectPhoto(i) {
  if (dirty && activePhotoIndex >= 0 && activePhotoIndex !== i) applyPhotoChanges();
  activePhotoIndex = i;
  renderPhotoGrid();
  populatePhotoForm(photos[i]);
  document.getElementById('photoEditorEmpty').style.display = 'none';
  document.getElementById('photoEditorInner').style.display = 'flex';
  setDirty(false);
}

function populatePhotoForm(p) {
  document.getElementById('photoFormTitle').textContent = p.title || 'Untitled';
  document.getElementById('pf-title').value       = p.title        || '';
  document.getElementById('pf-src').value         = p.src          || '';
  document.getElementById('pf-focalLength').value = p.focalLength  || '';
  document.getElementById('pf-aperture').value    = p.aperture     || '';
  document.getElementById('pf-shutterSpeed').value= p.shutterSpeed || '';
  document.getElementById('pf-orientation').value = p.orientation  || 'landscape';
  renderAlbumSelect(p.album);
  renderPhotoTags(p.tags || []);
  updatePreview(p.src, p.title);
}

function onSrcInput() {
  markDirty();
  var src = document.getElementById('pf-src').value.trim();
  var title = document.getElementById('pf-title').value.trim();
  updatePreview(src, title);
}

function updatePreview(src, title) {
  var img = document.getElementById('photoPreviewImg');
  var empty = document.getElementById('photoPreviewEmpty');
  var label = document.getElementById('photoPreviewLabel');
  if (src) {
    img.src = src; img.style.display = 'block'; empty.style.display = 'none';
    label.textContent = title || '';
  } else {
    img.style.display = 'none'; empty.style.display = 'block';
    label.textContent = '';
  }
}

function applyPhotoChanges() {
  if (activePhotoIndex < 0) return;
  var p = photos[activePhotoIndex];
  p.title        = v('pf-title');
  p.src          = v('pf-src');
  p.focalLength  = v('pf-focalLength');
  p.aperture     = v('pf-aperture');
  p.shutterSpeed = v('pf-shutterSpeed');
  p.orientation  = document.getElementById('pf-orientation').value;
  p.album        = document.getElementById('pf-album').value;
  p.tags         = getPhotoTags();
  p.id           = p.id || ('photo-'+Date.now());
  // Preserve order
  document.getElementById('photoFormTitle').textContent = p.title || 'Untitled';
  renderPhotoGrid();
  // If albums panel is open, refresh it
  if (currentTab === 'albums' && activeAlbumIndex >= 0) renderAlbumDetail(activeAlbumIndex);
}

function revertPhoto() {
  if (activePhotoIndex >= 0) { populatePhotoForm(photos[activePhotoIndex]); setDirty(false); }
}

function newPhoto() {
  photos.push({ id:'photo-'+Date.now(), title:'', album: albums[0]?albums[0].id:'', tags:[], src:'', orientation:'landscape', focalLength:'', aperture:'', shutterSpeed:'', order: photos.length+1 });
  renderPhotoGrid();
  selectPhoto(photos.length-1);
  document.getElementById('pf-title').focus();
}

function deletePhoto() {
  if (activePhotoIndex < 0) return;
  if (!confirm('Delete "' + (photos[activePhotoIndex].title||'this photo') + '"?')) return;
  photos.splice(activePhotoIndex, 1);
  activePhotoIndex = -1;
  document.getElementById('photoEditorEmpty').style.display = 'flex';
  document.getElementById('photoEditorInner').style.display = 'none';
  renderPhotoGrid(); setDirty(true);
}

// ── Album select in photo form ────────────────────────────────
function renderAlbumSelect(selected) {
  var sel = document.getElementById('pf-album');
  sel.innerHTML = '';
  albums.forEach(function(a) {
    var opt = document.createElement('option');
    opt.value = a.id; opt.textContent = a.name;
    if (a.id === selected) opt.selected = true;
    sel.appendChild(opt);
  });
}

// ── Photo tags ────────────────────────────────────────────────
function renderPhotoTags(tags) {
  photoTags = tags.slice();
  var c = document.getElementById('photo-tags-input');
  c.querySelectorAll('.tag-chip').forEach(function(el){ el.remove(); });
  var field = document.getElementById('photo-tag-field');
  photoTags.forEach(function(tag, i) {
    var chip = document.createElement('span');
    chip.className = 'tag-chip';
    chip.innerHTML = esc(tag)+'<button class="tag-chip-del" onclick="removePhotoTag('+i+')">✕</button>';
    c.insertBefore(chip, field);
  });
}
function onPhotoTagKey(e) {
  if (e.key==='Enter'||e.key===',') { e.preventDefault(); var val=e.target.value.replace(',','').trim(); if(val){photoTags.push(val);renderPhotoTags(photoTags);e.target.value='';markDirty();} }
  else if (e.key==='Backspace'&&!e.target.value&&photoTags.length) { photoTags.pop();renderPhotoTags(photoTags);markDirty(); }
}
function removePhotoTag(i) { photoTags.splice(i,1);renderPhotoTags(photoTags);markDirty(); }
function getPhotoTags() { return photoTags.slice(); }
function focusPhotoTagInput() { document.getElementById('photo-tag-field').focus(); }

// ══════════════════════════════════════════════════════
// ALBUMS
// ══════════════════════════════════════════════════════

function renderAlbumList() {
  var list = document.getElementById('albumList');
  list.innerHTML = '';
  albums.forEach(function(album, i) {
    var count = photos.filter(function(p){ return p.album===album.id; }).length;
    var row = document.createElement('div');
    row.className = 'album-row'+(i===activeAlbumIndex?' active':'');
    row.draggable = true; row.dataset.index = i;
    row.innerHTML =
      '<div class="album-row-drag">⠿</div>'
      +'<div class="album-row-info">'
      +'<div class="album-row-name'+(album.hidden?' hidden-album':'')+'">'+esc(album.name)+'</div>'
      +'<div class="album-row-meta">'+count+' photo'+(count!==1?'s':'')
      +(album.hidden?'<span class="album-hidden-badge">hidden</span>':'')
      +'</div></div>';
    row.addEventListener('click', function(){ selectAlbum(i); });
    row.addEventListener('dragstart', onAlbumDragStart);
    row.addEventListener('dragover',  onAlbumDragOver);
    row.addEventListener('drop',      onAlbumDrop);
    row.addEventListener('dragend',   onAlbumDragEnd);
    list.appendChild(row);
  });
  document.getElementById('albumCount').textContent = albums.length+' album'+(albums.length!==1?'s':'');
}

function selectAlbum(i) {
  activeAlbumIndex = i;
  renderAlbumList();
  renderAlbumDetail(i);
  document.getElementById('albumDetailEmpty').style.display = 'none';
  document.getElementById('albumDetailInner').style.display = 'flex';
}

function renderAlbumDetail(i) {
  var album = albums[i];
  document.getElementById('albumNameInput').value = album.name;
  var visBtn = document.getElementById('albumVisibilityBtn');
  visBtn.textContent = album.hidden ? 'Show' : 'Hide';

  var albumPhotos = photos
    .filter(function(p){ return p.album===album.id; })
    .slice().sort(function(a,b){ return (a.order||0)-(b.order||0); });

  var photoList = document.getElementById('albumPhotoList');
  var emptyHint = document.getElementById('albumEmptyHint');
  photoList.innerHTML = '';

  if (!albumPhotos.length) {
    emptyHint.style.display = 'block';
    return;
  }
  emptyHint.style.display = 'none';

  albumPhotos.forEach(function(photo, idx) {
    var globalIdx = photos.indexOf(photo);
    var row = document.createElement('div');
    row.className = 'album-photo-row';
    row.draggable = true; row.dataset.photoId = photo.id;
    var thumbHTML = photo.src
      ? '<img src="'+esc(photo.src)+'" alt="" loading="lazy">'
      : '<div class="album-photo-thumb-empty">◎</div>';
    row.innerHTML =
      '<div class="album-photo-drag">⠿</div>'
      +'<div class="album-photo-thumb">'+thumbHTML+'</div>'
      +'<div class="album-photo-info">'
      +'<div class="album-photo-title">'+esc(photo.title||'Untitled')+'</div>'
      +'<div class="album-photo-meta">'+(photo.focalLength||'')+(photo.aperture?' · '+photo.aperture:'')+'</div>'
      +'</div>'
      +'<button class="album-photo-del" onclick="removePhotoFromAlbum(event,\''+photo.id+'\')">✕</button>';

    // Click to edit
    row.querySelector('.album-photo-title').style.cursor = 'pointer';
    row.querySelector('.album-photo-title').style.textDecoration = 'underline';
    row.querySelector('.album-photo-title').style.textUnderlineOffset = '3px';
    row.querySelector('.album-photo-title').addEventListener('click', function(e){
      e.stopPropagation();
      switchTab('photos'); selectPhoto(globalIdx);
    });

    row.addEventListener('dragstart', onAlbumPhotoDragStart);
    row.addEventListener('dragover',  onAlbumPhotoDragOver);
    row.addEventListener('drop',      onAlbumPhotoDrop);
    row.addEventListener('dragend',   onAlbumPhotoDragEnd);
    photoList.appendChild(row);
  });
}

function onAlbumNameInput() {
  if (activeAlbumIndex < 0) return;
  albums[activeAlbumIndex].name = document.getElementById('albumNameInput').value;
  renderAlbumList();
  renderAlbumSelect();
  setGlobalDirty();
}

function toggleAlbumVisibility() {
  if (activeAlbumIndex < 0) return;
  albums[activeAlbumIndex].hidden = !albums[activeAlbumIndex].hidden;
  renderAlbumList();
  renderAlbumDetail(activeAlbumIndex);
  setGlobalDirty();
}

function deleteAlbum() {
  if (activeAlbumIndex < 0) return;
  var album = albums[activeAlbumIndex];
  var count = photos.filter(function(p){ return p.album===album.id; }).length;
  if (count > 0) { alert('Cannot delete "'+album.name+'" — it has '+count+' photo'+(count!==1?'s':'')+'. Reassign or remove them first.'); return; }
  if (!confirm('Delete album "'+album.name+'"?')) return;
  albums.splice(activeAlbumIndex, 1);
  activeAlbumIndex = -1;
  document.getElementById('albumDetailEmpty').style.display = 'flex';
  document.getElementById('albumDetailInner').style.display = 'none';
  renderAlbumList(); renderAlbumSelect(); setGlobalDirty();
}

function removePhotoFromAlbum(e, photoId) {
  e.stopPropagation();
  var p = photos.find(function(ph){ return ph.id===photoId; });
  if (!p) return;
  if (!confirm('Remove "'+( p.title||'this photo')+'" from this album? (The photo will still exist, unassigned.)')) return;
  p.album = '';
  renderAlbumDetail(activeAlbumIndex);
  renderAlbumList();
  renderPhotoGrid();
  setGlobalDirty();
}

function newAlbum() {
  var name = prompt('Album name:'); if (!name) return;
  var id = name.toLowerCase().trim().replace(/[^\w\s-]/g,'').replace(/\s+/g,'-');
  albums.push({ id:id, name:name, order:albums.length+1, hidden:false });
  renderAlbumList(); renderAlbumSelect(); setGlobalDirty();
}

// ── Global dirty (for albums tab saves via main save button) ──
function setGlobalDirty() {
  document.getElementById('saveBtn').textContent = '↓ Save photos.json';
  document.getElementById('pendingBadge').classList.add('visible');
}

// ── Album drag ────────────────────────────────────────────────
var albumDragSrc = -1;
function onAlbumDragStart(e) { albumDragSrc=parseInt(e.currentTarget.dataset.index); e.currentTarget.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; }
function onAlbumDragOver(e) { e.preventDefault(); document.querySelectorAll('.album-row').forEach(function(el){el.classList.remove('drag-over');}); e.currentTarget.classList.add('drag-over'); }
function onAlbumDrop(e) {
  e.preventDefault();
  var t=parseInt(e.currentTarget.dataset.index); if(albumDragSrc===t) return;
  var moved=albums.splice(albumDragSrc,1)[0]; albums.splice(t,0,moved);
  albums.forEach(function(a,i){ a.order=i+1; });
  if(activeAlbumIndex===albumDragSrc) activeAlbumIndex=t;
  else if(activeAlbumIndex>albumDragSrc&&activeAlbumIndex<=t) activeAlbumIndex--;
  else if(activeAlbumIndex<albumDragSrc&&activeAlbumIndex>=t) activeAlbumIndex++;
  renderAlbumList(); setGlobalDirty();
}
function onAlbumDragEnd(e) { document.querySelectorAll('.album-row').forEach(function(el){el.classList.remove('dragging','drag-over');}); }

// ── Album photo drag (reorder within album) ───────────────────
var albumPhotoDragId = null;
function onAlbumPhotoDragStart(e) { albumPhotoDragId=e.currentTarget.dataset.photoId; e.currentTarget.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; }
function onAlbumPhotoDragOver(e) { e.preventDefault(); document.querySelectorAll('.album-photo-row').forEach(function(el){el.classList.remove('drag-over');}); e.currentTarget.classList.add('drag-over'); }
function onAlbumPhotoDrop(e) {
  e.preventDefault();
  var targetId = e.currentTarget.dataset.photoId;
  if (!albumPhotoDragId || albumPhotoDragId===targetId) return;
  // Get current album photo order
  var album = albums[activeAlbumIndex];
  var albumPhotos = photos.filter(function(p){ return p.album===album.id; })
    .slice().sort(function(a,b){ return (a.order||0)-(b.order||0); });
  var srcIdx = albumPhotos.findIndex(function(p){ return p.id===albumPhotoDragId; });
  var tgtIdx = albumPhotos.findIndex(function(p){ return p.id===targetId; });
  if (srcIdx<0||tgtIdx<0) return;
  var moved = albumPhotos.splice(srcIdx,1)[0];
  albumPhotos.splice(tgtIdx,0,moved);
  // Write new order values
  albumPhotos.forEach(function(p,i){ p.order=i+1; });
  renderAlbumDetail(activeAlbumIndex);
  setGlobalDirty();
}
function onAlbumPhotoDragEnd(e) { document.querySelectorAll('.album-photo-row').forEach(function(el){el.classList.remove('dragging','drag-over');}); }

// ── Utils ─────────────────────────────────────────────────────
function getAlbumName(id) { var a=albums.find(function(al){return al.id===id;}); return a?a.name:(id||'—'); }
function v(id) { return document.getElementById(id).value.trim(); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
var toastTimer;
function showToast(msg, type) { var t=document.getElementById('toast'); t.textContent=msg; t.className='toast show'+(type?' '+type:''); clearTimeout(toastTimer); toastTimer=setTimeout(function(){t.classList.remove('show');},3000); }

function filterPhotoGrid() {
  var query = document.getElementById('photoSearch').value.toLowerCase().trim();
  var cards = document.querySelectorAll('.photo-thumb');
  var visible = 0;
  cards.forEach(function(card) {
    var i = parseInt(card.dataset.index);
    var p = photos[i];
    if (!p) return;
    var titleMatch = (p.title||'').toLowerCase().indexOf(query) >= 0;
    var tagMatch   = (p.tags||[]).some(function(t){ return t.toLowerCase().indexOf(query) >= 0; });
    var show = !query || titleMatch || tagMatch;
    card.style.display = show ? '' : 'none';
    if (show) visible++;
  });
  document.getElementById('photoCount').textContent = visible + ' photo' + (visible !== 1 ? 's' : '');
}

// ── Delegated input listeners ─────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('photoEditorForm').addEventListener('input', function(e){ if(e.target.id!=='photo-tag-field') markDirty(); });
  document.getElementById('photoEditorForm').addEventListener('change', function(e){ if(e.target.tagName==='SELECT') markDirty(); });
});
</script>
</body>
</html>
